<!DOCTYPE html>
<html lang="en">
<head>

<div class="stars-bg">

                </ul>

        </div>
    </div>

            <div class="first-image">

        <div class="carousel-section">

    <div id="lightbox">

        <span class="lightbox-arrow right">&#10095;</span>
        <img id="lightbox-img-current" />
